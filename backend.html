<!DOCTYPE html>
<html>
<head>
  <title>Backend Panel</title>
  <link rel="stylesheet" href="css/styles.css">

  <!-- IMPORTANT -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>

  <style>
    body { margin:0; display:flex; }
    .sidebar {
      width:220px;
      background:#1e1e1e;
      padding:20px;
      height:100vh;
    }
    .sidebar button {
      display:block;
      width:100%;
      margin-bottom:10px;
      padding:10px;
      cursor:pointer;
    }
    .content {
      flex:1;
      padding:20px;
      background:#111;
      color:white;
    }
    .section { display:none; }
  </style>
</head>

<body>

<div class="sidebar">
  <button onclick="showSection('payments')">Payments</button>
  <button onclick="showSection('staff')">Staff</button>
  <button onclick="showSection('feedback')">Feedback</button>
  <button onclick="showSection('reports')">Reports</button>
</div>

<div class="content">

  <div id="payments" class="section">
    <h1>Payments</h1>
    <div id="payment-stats"></div>
    <canvas id="revenueChart"></canvas>
    <table><tbody id="payments-tbody"></tbody></table>
  </div>

  <div id="staff" class="section">
    <h1>Staff</h1>
    <select id="role-filter" onchange="renderTable()"></select>
    <table><tbody id="staff-tbody"></tbody></table>
  </div>

  <div id="feedback" class="section">
    <h1>Feedback</h1>
    <div id="feedback-stats"></div>
    <table><tbody id="summary-tbody"></tbody></table>
    <div id="feedback-cards"></div>
  </div>

  <div id="reports" class="section">
    <h1>Reports</h1>
    <div id="kpi-row"></div>
    <canvas id="modeChart"></canvas>
    <canvas id="topItemsChart"></canvas>
    <canvas id="orderTypeChart"></canvas>
    <canvas id="loyaltyChart"></canvas>
  </div>

</div>

<script>
function showSection(id) {
  document.querySelectorAll('.section').forEach(sec => {
    sec.style.display = 'none';
  });
  document.getElementById(id).style.display = 'block';

  if (id === 'payments' && typeof renderPayments === "function") {
    renderPayments();
  }
  if (id === 'staff' && typeof renderTable === "function") {
    renderTable();
  }
  if (id === 'feedback' && typeof renderFeedback === "function") {
    renderFeedback();
  }
  if (id === 'reports' && typeof renderReports === "function") {
    renderReports();
  }
}

window.onload = () => {
  showSection('payments');
};
</script>

</body>
</html>
