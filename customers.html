<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Management</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="navbar">
    <div class="navbar-left">
      <button class="hamburger" id="hamburger">&#9776;</button>
      <div class="nav-logo">🍽️ Restaurant Manager</div>
    </div>
    <div class="nav-title">Customer Management</div>
    <div class="nav-clock" id="live-clock"></div>
  </header>

  <aside class="sidebar" id="sidebar">
    <a href="index.html">🏠 Dashboard</a>
    <a href="customers.html" class="active">👥 Customers</a>
    <a href="menu.html">🍽️ Menu</a>
    <a href="order.html">📋 Orders</a>
    <a href="inventory.html">📦 Inventory</a>
    <a href="payments.html">💳 Payments</a>
    <a href="staff.html">👨‍💼 Staff</a>
    <a href="feedback.html">💬 Feedback</a>
    <a href="reports.html">📊 Reports</a>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h2>Customers</h2>
      <button class="btn-primary" id="open-customer-modal">+ Add Customer</button>
    </div>

    <input class="search-bar" id="customer-search" placeholder="Search by name, phone, email" />

    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Address</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="customer-table-body"></tbody>
      </table>
    </div>
  </main>

  <div class="modal-overlay" id="customer-modal">
    <div class="modal-box">
      <button class="modal-close" id="close-customer-modal">&times;</button>
      <h3 class="section-title">Add Customer</h3>
      <form id="customer-form">
        <div class="form-group">
          <label class="form-label">Name</label>
          <input class="form-input" id="cust-name" required />
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-input" id="cust-phone" required />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="cust-email" type="email" required />
        </div>
        <div class="form-group">
          <label class="form-label">Address</label>
          <input class="form-input" id="cust-address" />
        </div>
        <button class="btn-success" type="submit">Save Customer</button>
      </form>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const API = 'http://localhost:5000/api';

    function setupSidebar() {
      const button = document.getElementById("hamburger");
      const sidebar = document.getElementById("sidebar");
      button.addEventListener("click", () => sidebar.classList.toggle("open"));
    }

    function setupClock() {
      const clock = document.getElementById("live-clock");
      const tick = () => { clock.textContent = new Date().toLocaleTimeString("en-IN"); };
      tick();
      setInterval(tick, 1000);
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.style.background = type === 'success' ? '#28a745' : '#dc3545';
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 3000);
    }

    async function loadCustomers() {
      try {
        const res = await fetch(`${API}/customers`);
        const customers = await res.json();
        renderCustomers(customers);
      } catch (err) {
        showToast('Failed to load customers!', 'error');
      }
    }

    function renderCustomers(customers) {
      const body = document.getElementById("customer-table-body");
      if (customers.length === 0) {
        body.innerHTML = `<tr><td colspan="6" style="text-align:center">No customers found</td></tr>`;
        return;
      }
      body.innerHTML = customers.map(c => `
        <tr>
          <td>${c.id}</td>
          <td>${c.name}</td>
          <td>${c.phone}</td>
          <td>${c.email}</td>
          <td>${c.address || '-'}</td>
          <td>
            <button class="btn-danger" onclick="deleteCustomer(${c.id})">Delete</button>
          </td>
        </tr>
      `).join('');
    }

    async function deleteCustomer(id) {
      if (!confirm('Are you sure you want to delete this customer?')) return;
      try {
        await fetch(`${API}/customers/${id}`, { method: 'DELETE' });
        showToast('Customer deleted!');
        loadCustomers();
      } catch (err) {
        showToast('Failed to delete customer!', 'error');
      }
    }

    function openModal() {
      document.getElementById("customer-modal").classList.add("show");
    }

    function closeModal() {
      document.getElementById("customer-modal").classList.remove("show");
      document.getElementById("customer-form").reset();
    }

    document.addEventListener("DOMContentLoaded", () => {
      setupSidebar();
      setupClock();
      loadCustomers();

      document.getElementById("customer-search").addEventListener("input", async (e) => {
        const query = e.target.value.toLowerCase();
        const res = await fetch(`${API}/customers`);
        const customers = await res.json();
        const filtered = customers.filter(c =>
          c.name.toLowerCase().includes(query) ||
          c.phone.includes(query) ||
          (c.email && c.email.toLowerCase().includes(query))
        );
        renderCustomers(filtered);
      });

      document.getElementById("open-customer-modal").addEventListener("click", openModal);
      document.getElementById("close-customer-modal").addEventListener("click", closeModal);
      document.getElementById("customer-modal").addEventListener("click", (e) => {
        if (e.target.id === "customer-modal") closeModal();
      });

      document.getElementById("customer-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const customer = {
          name: document.getElementById("cust-name").value.trim(),
          phone: document.getElementById("cust-phone").value.trim(),
          email: document.getElementById("cust-email").value.trim(),
          address: document.getElementById("cust-address").value.trim()
        };
        try {
          const res = await fetch(`${API}/customers`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(customer)
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          showToast('Customer added successfully!');
          closeModal();
          loadCustomers();
        } catch (err) {
          showToast(err.message || 'Failed to add customer!', 'error');
        }
      });
    });
  </script>
</body>
</html>
