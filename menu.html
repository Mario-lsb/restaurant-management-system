<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu Management</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="navbar">
    <div class="navbar-left">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="nav-logo">🍽️ Restaurant Manager</div>
    </div>
    <div class="nav-title">Menu Management</div>
    <div class="nav-clock" id="live-clock"></div>
  </header>

  <aside class="sidebar" id="sidebar">
    <a href="index.html">🏠 Dashboard</a>
    <a href="customers.html">👥 Customers</a>
    <a href="menu.html" class="active">🍽️ Menu</a>
    <a href="order.html">📋 Orders</a>
    <a href="inventory.html">📦 Inventory</a>
    <a href="payments.html">💳 Payments</a>
    <a href="staff.html">👨‍💼 Staff</a>
    <a href="feedback.html">💬 Feedback</a>
    <a href="reports.html">📊 Reports</a>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h2>Menu Items</h2>
      <button class="btn-primary" id="open-item-modal">+ Add Item</button>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" data-category="All">All</button>
      <button class="filter-btn" data-category="Starters">Starters</button>
      <button class="filter-btn" data-category="Mains">Mains</button>
      <button class="filter-btn" data-category="Desserts">Desserts</button>
      <button class="filter-btn" data-category="Drinks">Drinks</button>
    </div>

    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Availability</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="menu-table-body"></tbody>
      </table>
    </div>
  </main>

  <div class="modal-overlay" id="item-modal">
    <div class="modal-box">
      <button class="modal-close" id="close-item-modal">×</button>
      <h3 class="section-title">Add Menu Item</h3>
      <form id="item-form">
        <div class="form-group">
          <label class="form-label" for="item-name">Item Name</label>
          <input class="form-input" id="item-name" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="item-category">Category</label>
          <input class="form-input" id="item-category" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="item-price">Price</label>
          <input class="form-input" id="item-price" type="number" min="1" step="0.01" required />
        </div>
        <button class="btn-success" type="submit">Save Item</button>
      </form>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    function setupSidebar() {
      const button = document.getElementById("hamburger");
      const sidebar = document.getElementById("sidebar");
      button.addEventListener("click", () => sidebar.classList.toggle("open"));
    }

    function setupClock() {
      const clock = document.getElementById("live-clock");
      const tick = () => {
        clock.textContent = new Date().toLocaleTimeString("en-IN");
      };
      tick();
      setInterval(tick, 1000);
    }

    const categoryMap = {
      Starters: ["Starter", "Starters", "Breakfast", "Breads", "Appetizers"],
      Mains: ["Main", "Mains", "Main Course"],
      Desserts: ["Dessert", "Desserts"],
      Drinks: ["Drink", "Drinks", "Beverages"]
    };

    function filterByCategory(category) {
      const allItems = Menu.getAll();
      if (category === "All") return allItems;
      return allItems.filter((item) => (categoryMap[category] || []).includes(item.category));
    }

    function renderMenu(rows) {
      const body = document.getElementById("menu-table-body");
      body.innerHTML = rows.map((item) => `
        <tr>
          <td>${item.item_id}</td>
          <td>${item.item_name}</td>
          <td>${item.category}</td>
          <td>${Utils.formatCurrency(item.price)}</td>
          <td><span class="badge badge-success">Available</span></td>
          <td><button class="btn-danger" disabled>Delete</button></td>
        </tr>
      `).join("");
    }

    function openItemModal() {
      document.getElementById("item-modal").classList.add("show");
    }

    function closeItemModal() {
      document.getElementById("item-modal").classList.remove("show");
      document.getElementById("item-form").reset();
    }

    document.addEventListener("DOMContentLoaded", () => {
      setupSidebar();
      setupClock();
      renderMenu(Menu.getAll());

      document.querySelectorAll(".filter-btn").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll(".filter-btn").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          renderMenu(filterByCategory(button.dataset.category));
        });
      });

      document.getElementById("open-item-modal").addEventListener("click", openItemModal);
      document.getElementById("close-item-modal").addEventListener("click", closeItemModal);
      document.getElementById("item-modal").addEventListener("click", (event) => {
        if (event.target.id === "item-modal") {
          closeItemModal();
        }
      });

      document.getElementById("item-form").addEventListener("submit", (event) => {
        event.preventDefault();
        try {
          Menu.add({
            item_name: document.getElementById("item-name").value.trim(),
            category: document.getElementById("item-category").value.trim(),
            price: document.getElementById("item-price").value
          });
          renderMenu(Menu.getAll());
          closeItemModal();
          Utils.showSuccess("Item added!");
        } catch (error) {
          Utils.showError(error.message);
        }
      });
    });
  </script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
