<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventory Management</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
  <header class="navbar">
    <div class="navbar-left">
      <button class="hamburger" id="hamburger">&#9776;</button>
      <div class="nav-logo">🍽️ Restaurant Manager</div>
    </div>
    <div class="nav-title">Inventory Management</div>
    <div class="nav-clock" id="live-clock"></div>
  </header>

  <aside class="sidebar" id="sidebar">
    <a href="index.html">🏠 Dashboard</a>
    <a href="customers.html">👥 Customers</a>
    <a href="menu.html">🍽️ Menu</a>
    <a href="order.html">📋 Orders</a>
    <a href="inventory.html" class="active">📦 Inventory</a>
    <a href="payments.html">💳 Payments</a>
    <a href="staff.html">👨‍💼 Staff</a>
    <a href="feedback.html">💬 Feedback</a>
    <a href="reports.html">📊 Reports</a>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h2>Inventory</h2>
      <button class="btn-primary" id="open-stock-modal">+ Add Item</button>
    </div>

    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>ID</th><th>Item Name</th><th>Quantity</th>
            <th>Unit</th><th>Min Qty</th><th>Supplier</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="inventory-table-body"></tbody>
      </table>
    </div>
  </main>

  <div class="modal-overlay" id="stock-modal">
    <div class="modal-box">
      <button class="modal-close" id="close-stock-modal">&times;</button>
      <h3 class="section-title">Add Inventory Item</h3>
      <form id="stock-form">
        <div class="form-group">
          <label class="form-label">Item Name</label>
          <input class="form-input" id="inv-item-name" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Quantity</label>
          <input class="form-input" type="number" id="inv-quantity" min="1" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Unit</label>
          <input class="form-input" id="inv-unit" placeholder="kg, L, pcs"/>
        </div>
        <div class="form-group">
          <label class="form-label">Min Quantity</label>
          <input class="form-input" type="number" id="inv-min-qty" value="10"/>
        </div>
        <button class="btn-success" type="submit">Add Item</button>
      </form>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const API = 'http://localhost:5000/api';

    function setupSidebar() {
      document.getElementById("hamburger").addEventListener("click", () =>
        document.getElementById("sidebar").classList.toggle("open"));
    }

    function setupClock() {
      const clock = document.getElementById("live-clock");
      const tick = () => { clock.textContent = new Date().toLocaleTimeString("en-IN"); };
      tick(); setInterval(tick, 1000);
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.style.background = type === 'success' ? '#28a745' : '#dc3545';
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 3000);
    }

    async function loadInventory() {
      const res = await fetch(`${API}/inventory`);
      const items = await res.json();
      const body = document.getElementById("inventory-table-body");
      body.innerHTML = items.length ? items.map(item => {
        const low = item.quantity < item.min_quantity;
        return `
          <tr>
            <td>${item.id}</td>
            <td>${item.item_name}</td>
            <td>${item.quantity}</td>
            <td>${item.unit || '-'}</td>
            <td>${item.min_quantity || '-'}</td>
            <td>${item.supplier_name || '-'}</td>
            <td><span class="badge ${low ? 'badge-danger' : 'badge-success'}">${low ? 'Low Stock' : 'OK'}</span></td>
            <td><button class="btn-danger" onclick="deleteItem(${item.id})">Delete</button></td>
          </tr>
        `;
      }).join("") : `<tr><td colspan="8" style="text-align:center">No inventory items found.</td></tr>`;
    }

    async function deleteItem(id) {
      if (!confirm('Delete this item?')) return;
      await fetch(`${API}/inventory/${id}`, { method: 'DELETE' });
      showToast('Item deleted!');
      loadInventory();
    }

    document.addEventListener("DOMContentLoaded", () => {
      setupSidebar();
      setupClock();
      loadInventory();

      document.getElementById("open-stock-modal").addEventListener("click", () =>
        document.getElementById("stock-modal").classList.add("show"));
      document.getElementById("close-stock-modal").addEventListener("click", () => {
        document.getElementById("stock-modal").classList.remove("show");
        document.getElementById("stock-form").reset();
      });

      document.getElementById("stock-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const item = {
          item_name: document.getElementById("inv-item-name").value.trim(),
          quantity: document.getElementById("inv-quantity").value,
          unit: document.getElementById("inv-unit").value.trim(),
          min_quantity: document.getElementById("inv-min-qty").value
        };
        const res = await fetch(`${API}/inventory`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(item)
        });
        const data = await res.json();
        if (data.error) { showToast(data.error, 'error'); return; }
        showToast('Item added!');
        document.getElementById("stock-modal").classList.remove("show");
        document.getElementById("stock-form").reset();
        loadInventory();
      });
    });
  </script>
</body>
</html>
