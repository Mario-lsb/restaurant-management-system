<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff — RMS</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
  <div id="app">
    <div id="sidebar-placeholder"></div>
    <main class="page-content">
      <div class="page-header">
        <h1>Staff</h1>
        <button class="btn btn-primary" onclick="openAddModal()">+ Add Staff</button>
      </div>

      <!-- Filter by role -->
      <div class="filter-bar">
        <label>Filter by Role:</label>
        <select id="role-filter" onchange="renderTable()">
          <option value="">All Roles</option>
          <option>Manager</option>
          <option>Waiter</option>
          <option>Chef</option>
          <option>Cashier</option>
        </select>
      </div>

      <div class="card">
        <div class="card-body">
          <table class="data-table">
            <thead>
              <tr>
                <th>#</th><th>Name</th><th>Role</th>
                <th>Salary</th><th>Phone</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="staff-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add Staff Modal -->
  <div class="modal-overlay" id="staff-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Add Staff Member</h2>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="staff-name" placeholder="e.g. Ravi Kumar"/>
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="staff-role">
            <option>Waiter</option><option>Chef</option>
            <option>Manager</option><option>Cashier</option>
          </select>
        </div>
        <div class="form-group">
          <label>Salary (₹)</label>
          <input type="number" id="staff-salary" placeholder="e.g. 20000"/>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="staff-phone" placeholder="10-digit number"/>
        </div>
        <div id="staff-error" class="error-msg"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitStaff()">Add Staff</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    function renderTable() {
      const role = document.getElementById("role-filter").value;
      let data = Staff.getAll();
      if (role) data = data.filter(s => s.role === role);
      const tbody = document.getElementById("staff-tbody");
      tbody.innerHTML = data.length ? data.map((s, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${s.name}</td>
          <td><span class="badge badge-info">${s.role}</span></td>
          <td>${Utils.formatCurrency(s.salary)}</td>
          <td>${s.phone}</td>
          <td>
            <button class="btn btn-sm btn-secondary" onclick="editSalary(${s.staff_id}, ${s.salary})">Edit Salary</button>
          </td>
        </tr>
      `).join("") : `<tr><td colspan="6" class="empty-state">No staff found.</td></tr>`;
    }

    function openAddModal() {
      document.getElementById("staff-error").textContent = "";
      ["staff-name","staff-salary","staff-phone"].forEach(id => document.getElementById(id).value = "");
      document.getElementById("staff-modal").classList.add("active");
    }
    function closeModal() { document.getElementById("staff-modal").classList.remove("active"); }

    function submitStaff() {
      const name   = document.getElementById("staff-name").value.trim();
      const role   = document.getElementById("staff-role").value;
      const salary = document.getElementById("staff-salary").value;
      const phone  = document.getElementById("staff-phone").value.trim();
      try {
        Staff.add({ name, role, salary, phone });
        closeModal();
        renderTable();
        Utils.showSuccess("Staff member added!");
      } catch(e) {
        document.getElementById("staff-error").textContent = e.message;
      }
    }

    function editSalary(staff_id, current) {
      const val = prompt(`New salary for this staff member (current: ₹${current}):`, current);
      if (val === null) return;
      const salary = parseFloat(val);
      if (isNaN(salary) || salary <= 0) { Utils.showError("Invalid salary."); return; }
      Staff.update(staff_id, { salary });
      renderTable();
      Utils.showSuccess("Salary updated!");
    }

    renderTable();
  </script>
</body>
</html>
