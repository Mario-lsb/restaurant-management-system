<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff — RMS</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
  <header class="navbar">
    <div class="navbar-left">
      <button class="hamburger" id="hamburger">&#9776;</button>
      <div class="nav-logo">🍽️ Restaurant Manager</div>
    </div>
    <div class="nav-title">Staff Management</div>
    <div class="nav-clock" id="live-clock"></div>
  </header>

  <aside class="sidebar" id="sidebar">
    <a href="index.html">🏠 Dashboard</a>
    <a href="customers.html">👥 Customers</a>
    <a href="menu.html">🍽️ Menu</a>
    <a href="order.html">📋 Orders</a>
    <a href="inventory.html">📦 Inventory</a>
    <a href="payments.html">💳 Payments</a>
    <a href="staff.html" class="active">👨‍💼 Staff</a>
    <a href="feedback.html">💬 Feedback</a>
    <a href="reports.html">📊 Reports</a>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h2>Staff</h2>
      <button class="btn-primary" id="open-staff-modal">+ Add Staff</button>
    </div>

    <div class="filter-bar">
      <label>Filter by Role:</label>
      <select id="role-filter">
        <option value="">All Roles</option>
        <option>Manager</option>
        <option>Waiter</option>
        <option>Chef</option>
        <option>Cashier</option>
      </select>
    </div>

    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>#</th><th>Name</th><th>Role</th>
            <th>Salary</th><th>Phone</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="staff-tbody"></tbody>
      </table>
    </div>
  </main>

  <div class="modal-overlay" id="staff-modal">
    <div class="modal-box">
      <button class="modal-close" id="close-staff-modal">&times;</button>
      <h3 class="section-title">Add Staff Member</h3>
      <form id="staff-form">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-input" id="staff-name" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select class="form-input" id="staff-role">
            <option>Waiter</option><option>Chef</option>
            <option>Manager</option><option>Cashier</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Salary (₹)</label>
          <input class="form-input" type="number" id="staff-salary"/>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-input" type="tel" id="staff-phone"/>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="staff-email"/>
        </div>
        <div class="form-group">
          <label class="form-label">Joining Date</label>
          <input class="form-input" type="date" id="staff-joining"/>
        </div>
        <button class="btn-success" type="submit">Add Staff</button>
      </form>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const API = 'http://localhost:5000/api';

    function setupSidebar() {
      const button = document.getElementById("hamburger");
      const sidebar = document.getElementById("sidebar");
      button.addEventListener("click", () => sidebar.classList.toggle("open"));
    }

    function setupClock() {
      const clock = document.getElementById("live-clock");
      const tick = () => { clock.textContent = new Date().toLocaleTimeString("en-IN"); };
      tick(); setInterval(tick, 1000);
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.style.background = type === 'success' ? '#28a745' : '#dc3545';
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 3000);
    }

    async function loadStaff() {
      const role = document.getElementById("role-filter").value;
      const res = await fetch(`${API}/staff`);
      let staff = await res.json();
      if (role) staff = staff.filter(s => s.role === role);
      const tbody = document.getElementById("staff-tbody");
      tbody.innerHTML = staff.length ? staff.map((s, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${s.name}</td>
          <td><span class="badge badge-info">${s.role}</span></td>
          <td>₹${s.salary || 0}</td>
          <td>${s.phone || '-'}</td>
          <td><span class="badge ${s.status === 'active' ? 'badge-success' : 'badge-danger'}">${s.status}</span></td>
          <td>
            <button class="btn-danger" onclick="deleteStaff(${s.id})">Delete</button>
          </td>
        </tr>
      `).join("") : `<tr><td colspan="7" style="text-align:center">No staff found.</td></tr>`;
    }

    async function deleteStaff(id) {
      if (!confirm('Delete this staff member?')) return;
      await fetch(`${API}/staff/${id}`, { method: 'DELETE' });
      showToast('Staff deleted!');
      loadStaff();
    }

    document.addEventListener("DOMContentLoaded", () => {
      setupSidebar();
      setupClock();
      loadStaff();

      document.getElementById("role-filter").addEventListener("change", loadStaff);
      document.getElementById("open-staff-modal").addEventListener("click", () => {
        document.getElementById("staff-modal").classList.add("show");
      });
      document.getElementById("close-staff-modal").addEventListener("click", () => {
        document.getElementById("staff-modal").classList.remove("show");
        document.getElementById("staff-form").reset();
      });

      document.getElementById("staff-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const staff = {
          name: document.getElementById("staff-name").value.trim(),
          role: document.getElementById("staff-role").value,
          salary: document.getElementById("staff-salary").value,
          phone: document.getElementById("staff-phone").value.trim(),
          email: document.getElementById("staff-email").value.trim(),
          joining_date: document.getElementById("staff-joining").value
        };
        const res = await fetch(`${API}/staff`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(staff)
        });
        const data = await res.json();
        if (data.error) { showToast(data.error, 'error'); return; }
        showToast('Staff added!');
        document.getElementById("staff-modal").classList.remove("show");
        document.getElementById("staff-form").reset();
        loadStaff();
      });
    });
  </script>
</body>
</html>
