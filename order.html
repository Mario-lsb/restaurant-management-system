<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Management</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
  <header class="navbar">
    <div class="navbar-left">
      <button class="hamburger" id="hamburger">&#9776;</button>
      <div class="nav-logo">🍽️ Restaurant Manager</div>
    </div>
    <div class="nav-title">Order Management</div>
    <div class="nav-clock" id="live-clock"></div>
  </header>

  <aside class="sidebar" id="sidebar">
    <a href="index.html">🏠 Dashboard</a>
    <a href="customers.html">👥 Customers</a>
    <a href="menu.html">🍽️ Menu</a>
    <a href="order.html" class="active">📋 Orders</a>
    <a href="inventory.html">📦 Inventory</a>
    <a href="payments.html">💳 Payments</a>
    <a href="staff.html">👨‍💼 Staff</a>
    <a href="feedback.html">💬 Feedback</a>
    <a href="reports.html">📊 Reports</a>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h2>Orders</h2>
      <button class="btn-primary" id="open-order-modal">+ Place Order</button>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" data-status="All">All</button>
      <button class="filter-btn" data-status="Pending">Pending</button>
      <button class="filter-btn" data-status="Completed">Completed</button>
      <button class="filter-btn" data-status="Cancelled">Cancelled</button>
    </div>

    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Order ID</th><th>Customer</th><th>Staff</th>
            <th>Type</th><th>Total</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="orders-table-body"></tbody>
      </table>
    </div>
  </main>

  <div class="modal-overlay" id="order-modal">
    <div class="modal-box">
      <button class="modal-close" id="close-order-modal">&times;</button>
      <h3 class="section-title">Place Order</h3>
      <form id="order-form">
        <div class="form-group">
          <label class="form-label">Customer</label>
          <select class="form-input" id="order-customer"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Staff</label>
          <select class="form-input" id="order-staff"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Order Type</label>
          <select class="form-input" id="order-type">
            <option>Dine-In</option>
            <option>Takeaway</option>
            <option>Delivery</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Total Amount (₹)</label>
          <input class="form-input" type="number" id="order-amount" min="1" required/>
        </div>
        <button class="btn-success" type="submit">Place Order</button>
      </form>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const API = 'http://localhost:5000/api';
    let allOrders = [];

    function setupSidebar() {
      document.getElementById("hamburger").addEventListener("click", () =>
        document.getElementById("sidebar").classList.toggle("open"));
    }

    function setupClock() {
      const clock = document.getElementById("live-clock");
      const tick = () => { clock.textContent = new Date().toLocaleTimeString("en-IN"); };
      tick(); setInterval(tick, 1000);
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.style.background = type === 'success' ? '#28a745' : '#dc3545';
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 3000);
    }

    function getStatusClass(status) {
      if (status === "Completed") return "badge-success";
      if (status === "Pending") return "badge-warning";
      if (status === "Cancelled") return "badge-danger";
      return "";
    }

    async function loadOrders() {
      const res = await fetch(`${API}/orders`);
      allOrders = await res.json();
      const activeStatus = document.querySelector(".filter-btn.active").dataset.status;
      renderOrders(activeStatus === 'All' ? allOrders : allOrders.filter(o => o.status === activeStatus));
    }

    function renderOrders(orders) {
      const body = document.getElementById("orders-table-body");
      body.innerHTML = orders.length ? orders.map(order => `
        <tr>
          <td>#${order.id}</td>
          <td>${order.customer_name || '-'}</td>
          <td>${order.staff_name || '-'}</td>
          <td>${order.order_type}</td>
          <td>₹${order.total_amount || 0}</td>
          <td><span class="badge ${getStatusClass(order.status)}">${order.status}</span></td>
          <td>
            ${order.status === 'Pending'
              ? `<button class="btn-success" onclick="completeOrder(${order.id})">Complete</button>`
              : `<button class="btn-danger" onclick="deleteOrder(${order.id})">Delete</button>`}
          </td>
        </tr>
      `).join("") : `<tr><td colspan="7" style="text-align:center">No orders found.</td></tr>`;
    }

    async function completeOrder(id) {
      await fetch(`${API}/orders/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'Completed' })
      });
      showToast('Order completed!');
      loadOrders();
    }

    async function deleteOrder(id) {
      if (!confirm('Delete this order?')) return;
      await fetch(`${API}/orders/${id}`, { method: 'DELETE' });
      showToast('Order deleted!');
      loadOrders();
    }

    async function populateDropdowns() {
      const [custRes, staffRes] = await Promise.all([
        fetch(`${API}/customers`), fetch(`${API}/staff`)
      ]);
      const customers = await custRes.json();
      const staff = await staffRes.json();

      document.getElementById("order-customer").innerHTML =
        customers.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
      document.getElementById("order-staff").innerHTML =
        staff.map(s => `<option value="${s.id}">${s.name}</option>`).join("");
    }

    document.addEventListener("DOMContentLoaded", () => {
      setupSidebar();
      setupClock();
      loadOrders();

      document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          const status = btn.dataset.status;
          renderOrders(status === 'All' ? allOrders : allOrders.filter(o => o.status === status));
        });
      });

      document.getElementById("open-order-modal").addEventListener("click", () => {
        populateDropdowns();
        document.getElementById("order-modal").classList.add("show");
      });
      document.getElementById("close-order-modal").addEventListener("click", () => {
        document.getElementById("order-modal").classList.remove("show");
        document.getElementById("order-form").reset();
      });

      document.getElementById("order-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const order = {
          customer_id: document.getElementById("order-customer").value,
          staff_id: document.getElementById("order-staff").value,
          order_type: document.getElementById("order-type").value,
          total_amount: document.getElementById("order-amount").value,
          status: 'Pending'
        };
        const res = await fetch(`${API}/orders`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(order)
        });
        const data = await res.json();
        if (data.error) { showToast(data.error, 'error'); return; }
        showToast('Order placed!');
        document.getElementById("order-modal").classList.remove("show");
        document.getElementById("order-form").reset();
        loadOrders();
      });
    });
  </script>
</body>
</html>
