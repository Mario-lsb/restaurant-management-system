<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feedback — RMS</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
  <header class="navbar">
    <div class="navbar-left">
      <button class="hamburger" id="hamburger">&#9776;</button>
      <div class="nav-logo">🍽️ Restaurant Manager</div>
    </div>
    <div class="nav-title">Customer Feedback</div>
    <div class="nav-clock" id="live-clock"></div>
  </header>

  <aside class="sidebar" id="sidebar">
    <a href="index.html">🏠 Dashboard</a>
    <a href="customers.html">👥 Customers</a>
    <a href="menu.html">🍽️ Menu</a>
    <a href="order.html">📋 Orders</a>
    <a href="inventory.html">📦 Inventory</a>
    <a href="payments.html">💳 Payments</a>
    <a href="staff.html">👨‍💼 Staff</a>
    <a href="feedback.html" class="active">💬 Feedback</a>
    <a href="reports.html">📊 Reports</a>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h2>Customer Feedback</h2>
      <button class="btn-primary" id="open-feedback-modal">+ Add Feedback</button>
    </div>

    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>#</th><th>Customer</th><th>Order ID</th>
            <th>Rating</th><th>Comments</th><th>Date</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="feedback-tbody"></tbody>
      </table>
    </div>
  </main>

  <div class="modal-overlay" id="feedback-modal">
    <div class="modal-box">
      <button class="modal-close" id="close-feedback-modal">&times;</button>
      <h3 class="section-title">Submit Feedback</h3>
      <form id="feedback-form">
        <div class="form-group">
          <label class="form-label">Customer</label>
          <select class="form-input" id="fb-customer"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Order ID</label>
          <select class="form-input" id="fb-order"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Rating (1-5)</label>
          <input class="form-input" type="number" id="fb-rating" min="1" max="5" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Comments</label>
          <textarea class="form-input" id="fb-comments" rows="3"></textarea>
        </div>
        <button class="btn-success" type="submit">Submit Feedback</button>
      </form>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const API = 'http://localhost:5000/api';

    function setupSidebar() {
      document.getElementById("hamburger").addEventListener("click", () =>
        document.getElementById("sidebar").classList.toggle("open"));
    }

    function setupClock() {
      const clock = document.getElementById("live-clock");
      const tick = () => { clock.textContent = new Date().toLocaleTimeString("en-IN"); };
      tick(); setInterval(tick, 1000);
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.style.background = type === 'success' ? '#28a745' : '#dc3545';
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 3000);
    }

    function starsHtml(rating) {
      return Array.from({length: 5}, (_, i) =>
        `<span style="color:${i < rating ? '#f5a623' : '#ccc'}">★</span>`
      ).join("");
    }

    async function loadFeedback() {
      const res = await fetch(`${API}/feedback`);
      const feedback = await res.json();
      const tbody = document.getElementById("feedback-tbody");
      tbody.innerHTML = feedback.length ? feedback.map((f, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${f.customer_name || '-'}</td>
          <td>#${f.order_id || '-'}</td>
          <td>${starsHtml(f.rating)}</td>
          <td>${f.comments || '-'}</td>
          <td>${new Date(f.created_at).toLocaleDateString('en-IN')}</td>
          <td><button class="btn-danger" onclick="deleteFeedback(${f.id})">Delete</button></td>
        </tr>
      `).join("") : `<tr><td colspan="7" style="text-align:center">No feedback yet.</td></tr>`;
    }

    async function deleteFeedback(id) {
      if (!confirm('Delete this feedback?')) return;
      await fetch(`${API}/feedback/${id}`, { method: 'DELETE' });
      showToast('Feedback deleted!');
      loadFeedback();
    }

    async function populateDropdowns() {
      const [custRes, orderRes] = await Promise.all([
        fetch(`${API}/customers`), fetch(`${API}/orders`)
      ]);
      const customers = await custRes.json();
      const orders = await orderRes.json();
      document.getElementById("fb-customer").innerHTML =
        customers.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
      document.getElementById("fb-order").innerHTML =
        orders.map(o => `<option value="${o.id}">#${o.id} - ${o.customer_name || ''}</option>`).join("");
    }

    document.addEventListener("DOMContentLoaded", () => {
      setupSidebar();
      setupClock();
      loadFeedback();

      document.getElementById("open-feedback-modal").addEventListener("click", () => {
        populateDropdowns();
        document.getElementById("feedback-modal").classList.add("show");
      });
      document.getElementById("close-feedback-modal").addEventListener("click", () => {
        document.getElementById("feedback-modal").classList.remove("show");
        document.getElementById("feedback-form").reset();
      });

      document.getElementById("feedback-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const feedback = {
          customer_id: document.getElementById("fb-customer").value,
          order_id: document.getElementById("fb-order").value,
          rating: document.getElementById("fb-rating").value,
          comments: document.getElementById("fb-comments").value.trim()
        };
        const res = await fetch(`${API}/feedback`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(feedback)
        });
        const data = await res.json();
        if (data.error) { showToast(data.error, 'error'); return; }
        showToast('Feedback submitted!');
        document.getElementById("feedback-modal").classList.remove("show");
        document.getElementById("feedback-form").reset();
        loadFeedback();
      });
    });
  </script>
</body>
</html>
