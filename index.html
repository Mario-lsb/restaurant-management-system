<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="navbar">
    <div class="navbar-left">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="nav-logo">🍽️ Restaurant Manager</div>
    </div>
    <div class="nav-title">Dashboard</div>
    <div class="nav-clock" id="live-clock"></div>
  </header>

  <aside class="sidebar" id="sidebar">
    <a href="index.html" class="active">🏠 Dashboard</a>
    <a href="customers.html">👥 Customers</a>
    <a href="menu.html">🍽️ Menu</a>
    <a href="order.html">📋 Orders</a>
    <a href="inventory.html">📦 Inventory</a>
    <a href="payments.html">💳 Payments</a>
    <a href="staff.html">👨‍💼 Staff</a>
    <a href="feedback.html">💬 Feedback</a>
    <a href="reports.html">📊 Reports</a>
  </aside>

  <main class="main-content">
    <section class="cards-grid">
      <div class="card">
        <div class="card-icon">📋</div>
        <div class="card-label">Total Orders</div>
        <div class="card-number" id="total-orders">0</div>
      </div>
      <div class="card">
        <div class="card-icon">💰</div>
        <div class="card-label">Total Revenue</div>
        <div class="card-number" id="total-revenue">₹0.00</div>
      </div>
      <div class="card">
        <div class="card-icon">⚠️</div>
        <div class="card-label">Low Stock Items</div>
        <div class="card-number" id="low-stock-count">0</div>
      </div>
      <div class="card">
        <div class="card-icon">👥</div>
        <div class="card-label">Active Customers</div>
        <div class="card-number" id="active-customers">0</div>
      </div>
    </section>

    <h3 class="section-title">Recent Orders</h3>
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Items</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody id="recent-orders-body"></tbody>
      </table>
    </div>

    <h3 class="section-title">Low Stock</h3>
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Item</th>
            <th>Supplier</th>
            <th>Qty</th>
          </tr>
        </thead>
        <tbody id="low-stock-list"></tbody>
      </table>
    </div>
  </main>

  <div id="toast"></div>

  <script>
    function setupSidebar() {
      const button = document.getElementById("hamburger");
      const sidebar = document.getElementById("sidebar");
      button.addEventListener("click", () => sidebar.classList.toggle("open"));
    }

    function setupClock() {
      const clock = document.getElementById("live-clock");
      const tick = () => {
        clock.textContent = new Date().toLocaleTimeString("en-IN");
      };
      tick();
      setInterval(tick, 1000);
    }

    function getStatusClass(status) {
      if (status === "Completed") return "badge-success";
      if (status === "Pending") return "badge-warning";
      if (status === "Cancelled") return "badge-danger";
      return "";
    }

    function renderDashboard() {
      const stats = Reports.getDashboardStats();
      document.getElementById("total-orders").textContent = stats.total_orders;
      document.getElementById("total-revenue").textContent = Utils.formatCurrency(stats.total_revenue);
      document.getElementById("low-stock-count").textContent = stats.low_stock_count;
      document.getElementById("active-customers").textContent = stats.total_customers;

      const recentBody = document.getElementById("recent-orders-body");
      const recent = Orders.getFullList().slice(-5).reverse();
      recentBody.innerHTML = recent.map((order) => `
        <tr>
          <td>${order.order_id}</td>
          <td>${order.customer_name || "—"}</td>
          <td>${order.order_type}</td>
          <td>${order.amount ? Utils.formatCurrency(order.amount) : "Unpaid"}</td>
          <td><span class="badge ${getStatusClass(order.status)}">${order.status}</span></td>
          <td>${Utils.formatDateTime(order.order_date)}</td>
        </tr>
      `).join("");

      const lowBody = document.getElementById("low-stock-list");
      const lowList = Inventory.getLowStock();
      lowBody.innerHTML = lowList.map((item) => `
        <tr class="alert-low-stock">
          <td>${item.ingredient_name}</td>
          <td>${item.supplier_name || "—"}</td>
          <td>${item.quantity_available} ${item.unit}</td>
        </tr>
      `).join("");

      if (!lowList.length) {
        lowBody.innerHTML = '<tr><td colspan="3">No low stock items.</td></tr>';
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      setupSidebar();
      setupClock();
      renderDashboard();
    });
  </script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
