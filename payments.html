<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payments — RMS</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
  <header class="navbar">
    <div class="navbar-left">
      <button class="hamburger" id="hamburger">&#9776;</button>
      <div class="nav-logo">🍽️ Restaurant Manager</div>
    </div>
    <div class="nav-title">Payments</div>
    <div class="nav-clock" id="live-clock"></div>
  </header>

  <aside class="sidebar" id="sidebar">
    <a href="index.html">🏠 Dashboard</a>
    <a href="customers.html">👥 Customers</a>
    <a href="menu.html">🍽️ Menu</a>
    <a href="order.html">📋 Orders</a>
    <a href="inventory.html">📦 Inventory</a>
    <a href="payments.html" class="active">💳 Payments</a>
    <a href="staff.html">👨‍💼 Staff</a>
    <a href="feedback.html">💬 Feedback</a>
    <a href="reports.html">📊 Reports</a>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h2>Payments</h2>
      <button class="btn-primary" id="open-payment-modal">+ Process Payment</button>
    </div>

    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>#</th><th>Order ID</th><th>Customer</th>
            <th>Amount</th><th>Method</th><th>Status</th><th>Date</th>
          </tr>
        </thead>
        <tbody id="payments-tbody"></tbody>
      </table>
    </div>
  </main>

  <div class="modal-overlay" id="payment-modal">
    <div class="modal-box">
      <button class="modal-close" id="close-payment-modal">&times;</button>
      <h3 class="section-title">Process Payment</h3>
      <form id="payment-form">
        <div class="form-group">
          <label class="form-label">Order ID</label>
          <select class="form-input" id="pay-order-id"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Amount (₹)</label>
          <input class="form-input" type="number" id="pay-amount" min="1" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Payment Method</label>
          <select class="form-input" id="pay-method">
            <option value="cash">Cash</option>
            <option value="card">Card</option>
            <option value="upi">UPI</option>
          </select>
        </div>
        <button class="btn-success" type="submit">Confirm Payment</button>
      </form>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const API = 'http://localhost:5000/api';

    function setupSidebar() {
      document.getElementById("hamburger").addEventListener("click", () =>
        document.getElementById("sidebar").classList.toggle("open"));
    }

    function setupClock() {
      const clock = document.getElementById("live-clock");
      const tick = () => { clock.textContent = new Date().toLocaleTimeString("en-IN"); };
      tick(); setInterval(tick, 1000);
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.style.background = type === 'success' ? '#28a745' : '#dc3545';
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 3000);
    }

    async function loadPayments() {
      const res = await fetch(`${API}/payments`);
      const payments = await res.json();
      const tbody = document.getElementById("payments-tbody");
      tbody.innerHTML = payments.length ? payments.map((p, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>#${p.order_id}</td>
          <td>${p.customer_name || '-'}</td>
          <td>₹${p.amount}</td>
          <td><span class="badge badge-info">${p.payment_method}</span></td>
          <td><span class="badge ${p.payment_status === 'completed' ? 'badge-success' : 'badge-warning'}">${p.payment_status}</span></td>
          <td>${new Date(p.payment_date).toLocaleDateString('en-IN')}</td>
        </tr>
      `).join("") : `<tr><td colspan="7" style="text-align:center">No payments yet.</td></tr>`;
    }

    async function loadOrders() {
      const res = await fetch(`${API}/orders`);
      const orders = await res.json();
      const pending = orders.filter(o => o.status === 'Pending');
      document.getElementById("pay-order-id").innerHTML =
        pending.map(o => `<option value="${o.id}">#${o.id} - ${o.customer_name || 'Unknown'}</option>`).join("");
    }

    document.addEventListener("DOMContentLoaded", () => {
      setupSidebar();
      setupClock();
      loadPayments();

      document.getElementById("open-payment-modal").addEventListener("click", () => {
        loadOrders();
        document.getElementById("payment-modal").classList.add("show");
      });
      document.getElementById("close-payment-modal").addEventListener("click", () => {
        document.getElementById("payment-modal").classList.remove("show");
        document.getElementById("payment-form").reset();
      });

      document.getElementById("payment-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const payment = {
          order_id: document.getElementById("pay-order-id").value,
          amount: document.getElementById("pay-amount").value,
          payment_method: document.getElementById("pay-method").value,
          payment_status: 'completed'
        };
        const res = await fetch(`${API}/payments`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payment)
        });
        const data = await res.json();
        if (data.error) { showToast(data.error, 'error'); return; }
        showToast('Payment recorded!');
        document.getElementById("payment-modal").classList.remove("show");
        document.getElementById("payment-form").reset();
        loadPayments();
      });
    });
  </script>
</body>
</html>
